name: flutter_mimc
description: A maintained, multi-platform Flutter plugin for Xiaomi MIMC.
version: 2.0.0-dev.1
homepage: https://github.com/owxo/flutter_mimc
repository: https://github.com/owxo/flutter_mimc
issue_tracker: https://github.com/owxo/flutter_mimc/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  web: ^1.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.xiaomi.mimc.flutter_mimc
        pluginClass: FlutterMimcPlugin
      ios:
        pluginClass: FlutterMimcPlugin
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      web:
        pluginClass: FlutterMimcWeb
        fileName: flutter_mimc_web.dart
  assets:
    - assets/web/mimc-min_1_0_3.js
